openapi: 3.0.4
info:
  title: User Service API
  version: 2.0.0
  description: >
    Сервис управления пользователями и аутентификацией. Обрабатывает регистрацию,
    вход, обновление токенов, выход, настройки аккаунта и заявки на роль преподавателя.

servers:
  - url: http://localhost:8081
    description: Local Dev Server

tags:
  - name: Authentication
    description: Регистрация, вход, обновление токенов, выход
  - name: Users
    description: Управление пользователями и профилями
  - name: Teacher Requests
    description: Заявки пользователей на роль преподавателя
  - name: Admin Teacher Requests
    description: Административная модерация заявок преподавателей
  - name: Health
    description: Проверка доступности сервиса

paths:
  /health:
    get:
      summary: Проверка состояния сервиса
      tags: [Health]
      servers:
        - url: http://127.0.0.1:8081
          description: Local Dev Server
      responses:
        '200':
          description: Сервис доступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "UP"
                service: "UserService"
                timestamp: "2026-05-13T12:00:00Z"
        '500':
          description: Ошибка сервиса

  /api/v1/auth/.well-known/jwks.json:
    get:
      summary: Получить публичные JWK ключи для проверки JWT
      tags: [Authentication]
      responses:
        '200':
          description: Набор публичных ключей JWKS
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
              example:
                keys:
                  - kty: "RSA"
                    use: "sig"
                    kid: "user-service-rsa-1"
                    alg: "RS256"
                    n: "..."
                    e: "AQAB"
        '500':
          description: Ошибка сервиса

  /api/v1/auth/register:
    post:
      summary: Регистрация нового пользователя
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Пользователь успешно зарегистрирован, выданы access и refresh токены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Ошибка валидации запроса (невалидный email, пароль короче 8 символов)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "email: Invalid email format"
                code: 400
                timestamp: "2026-02-24T12:00:00Z"
        '409':
          description: Пользователь с таким email уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "User with email already exists: user@example.com"
                code: 409
                timestamp: "2026-02-24T12:00:00Z"
        '500':
          description: Ошибка сервиса

  /api/v1/auth/login:
    post:
      summary: Аутентификация пользователя
      tags: [Authentication]
      description: >
        При успешной аутентификации выдаются access и refresh токены.
        Access токен действителен 15 минут, refresh токен - 7 дней.
        Все предыдущие refresh токены пользователя автоматически отзываются.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Ошибка валидации запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "email: must not be blank"
                code: 400
                timestamp: "2026-02-24T12:00:00Z"
        '401':
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Invalid email or password"
                code: 401
                timestamp: "2026-02-24T12:00:00Z"
        '500':
          description: Ошибка сервиса

  /api/v1/auth/refresh:
    post:
      summary: Обновление access токена
      tags: [Authentication]
      description: >
        Используйте refresh токен для получения нового access токена.
        Refresh токен проверяется по базе данных на валидность и отсутствие отзыва.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Новый access токен выдан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                user:
                  id: 2
                  email: "test2@mail.com"
                  fullName: "Тест Тестов"
                  role: "STUDENT"
                  status: "ACTIVE"
                  avatarUrl: null
                  bio: null
                  preferredLocale: "ru"
                accessToken: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIi..."
                refreshToken: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIi..."
                tokenType: "Bearer"
                expiresIn: 900
        '400':
          description: Ошибка валидации запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "refreshToken: must not be blank"
                code: 400
                timestamp: "2026-02-24T12:00:00Z"
        '401':
          description: Refresh токен невалидный, истек, отозван или не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidOrExpired:
                  value:
                    message: "Invalid or expired refresh token"
                    code: 401
                    timestamp: "2026-02-24T12:00:00Z"
                notFound:
                  value:
                    message: "Refresh token not found"
                    code: 401
                    timestamp: "2026-02-24T12:00:00Z"
                revoked:
                  value:
                    message: "Refresh token has been revoked"
                    code: 401
                    timestamp: "2026-02-24T12:00:00Z"
        '500':
          description: Ошибка сервиса

  /api/v1/auth/logout:
    post:
      summary: Выход из системы (отзыв refresh токенов)
      tags: [Authentication]
      description: >
        Отзывает все refresh токены пользователя по access token из заголовка
        Authorization. Body не требуется.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer access token
      responses:
        '204':
          description: Успешный выход, все refresh токены отозваны
        '401':
          description: Access token отсутствует, невалидный или истек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Invalid or expired access token"
                code: 401
                timestamp: "2026-02-24T12:00:00Z"
        '500':
          description: Ошибка сервиса

  /api/v1/users/me:
    get:
      summary: Получить профиль текущего пользователя
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '401':
          description: Access токен отсутствует, невалидный или истек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Full authentication is required"
                code: 401
                timestamp: "2026-02-24T12:00:00Z"
        '500':
          description: Ошибка сервиса


  /api/v1/users/me/settings:
    get:
      summary: Получить настройки текущего пользователя
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Настройки аккаунта пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '401':
          description: Access токен отсутствует, невалидный или истек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me/password:
    put:
      summary: Сменить пароль текущего пользователя
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Пароль успешно обновлен
        '400':
          description: Ошибка валидации запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access токен отсутствует, невалидный или истек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Обновить настройки текущего пользователя
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsRequest'
      responses:
        '200':
          description: Настройки аккаунта обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '400':
          description: Ошибка валидации запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access токен отсутствует, невалидный или истек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/teacher-requests:
    post:
      summary: Создать заявку на роль преподавателя
      tags: [Teacher Requests]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherRequestCreateRequest'
      responses:
        '201':
          description: Заявка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherRequestResponse'
        '400':
          description: Ошибка валидации запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access токен отсутствует, невалидный или истек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Заявка уже ожидает рассмотрения или пользователь уже TEACHER/ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/teacher-requests/me:
    get:
      summary: Получить текущую заявку пользователя на роль преподавателя
      tags: [Teacher Requests]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Последняя заявка пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherRequestResponse'
        '204':
          description: У пользователя нет заявок
        '401':
          description: Access токен отсутствует, невалидный или истек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/teacher-requests:
    get:
      summary: Получить список заявок на роль преподавателя
      tags: [Admin Teacher Requests]
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TeacherRequestStatus'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Страница заявок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherRequestPageResponse'
        '403':
          description: Недостаточно прав, требуется ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/teacher-requests/{requestId}/approve:
    post:
      summary: Одобрить заявку и повысить пользователя до TEACHER
      tags: [Admin Teacher Requests]
      security:
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Заявка одобрена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherRequestResponse'
        '403':
          description: Недостаточно прав, требуется ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Заявка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/teacher-requests/{requestId}/reject:
    post:
      summary: Отклонить заявку на роль преподавателя
      tags: [Admin Teacher Requests]
      security:
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherRequestRejectRequest'
      responses:
        '200':
          description: Заявка отклонена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherRequestResponse'
        '400':
          description: Ошибка валидации запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Недостаточно прав, требуется ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Заявка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/{id}:
    get:
      summary: Получить пользователя по ID (только для администраторов)
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID пользователя
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '401':
          description: Access токен отсутствует, невалидный или истек
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Full authentication is required"
                code: 401
                timestamp: "2026-02-24T12:00:00Z"
        '403':
          description: Недостаточно прав (требуется роль ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Access Denied"
                code: 403
                timestamp: "2026-02-24T12:00:00Z"
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "User not found"
                code: 404
                timestamp: "2026-02-24T12:00:00Z"
        '500':
          description: Ошибка сервиса

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT токен, полученный при аутентификации через /auth/login.
        Токен должен быть передан в заголовке Authorization: Bearer <token>

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
          description: Email пользователя (должен быть уникальным)
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          description: Пароль (минимум 8 символов)
          example: "securePassword123"
        fullName:
          type: string
          description: Полное имя пользователя
          example: "Иван Иванов"
        role:
          type: string
          enum: [STUDENT, TEACHER]
          description: Роль пользователя при self-service регистрации, по умолчанию STUDENT
          example: "STUDENT"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          example: "securePassword123"

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Refresh токен, полученный при логине
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access токен
          example: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIi..."
        refreshToken:
          type: string
          description: JWT refresh токен
          example: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIi..."
        tokenType:
          type: string
          description: Тип токена
          example: "Bearer"
        expiresIn:
          type: integer
          format: int64
          description: Срок действия access токена в секундах
          example: 900

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          example: "securePassword123"
        newPassword:
          type: string
          minLength: 8
          example: "newSecurePassword123"

    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID пользователя
          example: 2
        email:
          type: string
          description: Email пользователя
          example: "test2@mail.com"
        fullName:
          type: string
          description: Полное имя пользователя
          example: "Тест Тестов"
        role:
          type: string
          enum: [STUDENT, TEACHER, ADMIN]
          description: Роль пользователя в системе
          example: "STUDENT"
        status:
          type: string
          enum: [ACTIVE, BLOCKED, DELETED]
          description: Статус пользователя
          example: "ACTIVE"
        avatarUrl:
          type: string
          nullable: true
          maxLength: 1000
          example: "https://example.com/avatar.png"
        bio:
          type: string
          nullable: true
          maxLength: 2000
          example: "Java learner"
        preferredLocale:
          type: string
          enum: [ru, en]
          example: "ru"


    UserSettingsRequest:
      type: object
      required: [fullName, preferredLocale]
      properties:
        fullName:
          type: string
          maxLength: 255
          example: "Roman Aksenov"
        avatarUrl:
          type: string
          nullable: true
          maxLength: 1000
          example: "https://example.com/avatar.png"
        bio:
          type: string
          nullable: true
          maxLength: 2000
          example: "Java learner"
        preferredLocale:
          type: string
          enum: [ru, en]
          example: "ru"

    UserSettingsResponse:
      allOf:
        - $ref: '#/components/schemas/UserDto'

    TeacherRequestStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, CANCELLED]

    TeacherRequestCreateRequest:
      type: object
      required: [motivation]
      properties:
        motivation:
          type: string
          example: "I want to create Java courses."
        experience:
          type: string
          nullable: true
          example: "3 years of Java backend experience."
        portfolioUrl:
          type: string
          nullable: true
          maxLength: 1000
          example: "https://example.com"
        preferredTopics:
          type: array
          items:
            type: string
          example: ["Java", "Spring Boot"]

    TeacherRequestRejectRequest:
      type: object
      required: [reviewComment]
      properties:
        reviewComment:
          type: string
          example: "Please provide more teaching experience details."

    TeacherRequestResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        userId:
          type: integer
          format: int64
          example: 1
        userEmail:
          type: string
          nullable: true
          example: "user@example.com"
        userFullName:
          type: string
          nullable: true
          example: "Roman Aksenov"
        status:
          $ref: '#/components/schemas/TeacherRequestStatus'
        motivation:
          type: string
          example: "I want to create Java courses."
        experience:
          type: string
          nullable: true
        portfolioUrl:
          type: string
          nullable: true
        preferredTopics:
          type: array
          items:
            type: string
        reviewComment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        reviewedByUserId:
          type: integer
          format: int64
          nullable: true

    TeacherRequestPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TeacherRequestResponse'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalItems:
          type: integer
          format: int64
          example: 1
        totalPages:
          type: integer
          example: 1

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          description: Состояние сервиса
          example: "UP"
        service:
          type: string
          description: Название сервиса
          example: "UserService"
        timestamp:
          type: string
          format: date-time
          description: Время ответа health check
          example: "2026-05-13T12:00:00Z"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Описание ошибки
        code:
          type: integer
          description: HTTP код ошибки
        timestamp:
          type: string
          format: date-time
          description: Время возникновения ошибки
