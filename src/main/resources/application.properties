spring.application.name=UserService
server.port=${SERVER_PORT:8089}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:6766/user_service}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=${FLYWAY_ENABLED:false}

app.jwt.private-key=${JWT_PRIVATE_KEY:}
app.jwt.key-id=${JWT_KEY_ID:user-service-rsa-1}
app.jwt.issuer=${JWT_ISSUER:study-platform-user-service}
app.jwt.audience=${JWT_AUDIENCE:study-platform}
app.jwt.access-expiration-minutes=${JWT_ACCESS_EXPIRATION_MINUTES:15}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.studyplatform.userService=${LOG_LEVEL_USERSERVICE:DEBUG}
