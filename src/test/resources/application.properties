spring.application.name=UserServiceTest

spring.datasource.url=jdbc:h2:mem:user_service_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

app.jwt.private-key=
app.jwt.key-id=test-user-service-rsa-1
app.jwt.issuer=study-platform-user-service
app.jwt.audience=study-platform
app.jwt.access-expiration-minutes=15
app.jwt.refresh-expiration-days=7

logging.level.root=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.studyplatform.userService=DEBUG
