services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: studybytes/user-service:local
    container_name: user-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-user_service}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${SERVER_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - user_backend_net
      - user_db_net

  postgres:
    image: postgres:16-alpine
    container_name: user-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-user_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - user_db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-user_service}"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  user_backend_net:
    name: ${USER_BACKEND_NETWORK:-studybytes_backend_net}
    external: true
  user_db_net:
    name: ${USER_DB_NETWORK:-user_db_net}
    driver: bridge
    internal: true

volumes:
  postgres-data:
    name: user_postgres_data
